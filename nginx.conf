server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Handle static assets first (both absolute and relative paths)
    location ~* ^/assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin proxy to traffic-tester so the SPA can call the backend
    # without crossing origins (which would otherwise trigger a CORS preflight).
    # Don't override Host — the Dokkimi interceptor routes by Host header, so
    # we want the upstream to see Host: traffic-tester (nginx's default for
    # proxy_pass), not the original client's Host: routing-test-ui.
    location /traffic-tester/ {
        proxy_pass http://traffic-tester/;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache other static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
